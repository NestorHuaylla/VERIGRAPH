name: verigraph-prod

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_PORT: ${NEXT_PUBLIC_API_PORT:-8000}
        NEXT_PUBLIC_KEYCLOAK_ENABLED: ${NEXT_PUBLIC_KEYCLOAK_ENABLED:-false}
    env_file:
      - .env.production
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - .env.production
    command: ["sh", "-c", "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - api-evidence:/app/storage/evidence
      - ./imports:/imports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_security_procedures_allowlist: gds.*
      NEO4J_server_memory_heap_initial__size: 768m
      NEO4J_server_memory_heap_max__size: 1536m
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "${NEO4J_BROWSER_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env.production
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  worker-external:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    command: celery -A worker.celery_app worker -Q external_checks -n external@%h --loglevel=info
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    profiles:
      - workers
    restart: unless-stopped

  worker-analysis:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    command: celery -A worker.celery_app worker -Q analysis -n analysis@%h --loglevel=info
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      api:
        condition: service_healthy
    profiles:
      - workers
    restart: unless-stopped

volumes:
  api-evidence:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  minio-data:
